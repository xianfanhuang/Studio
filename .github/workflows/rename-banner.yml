name: Rename banner file and update README

on:
  workflow_dispatch:

jobs:
  rename-banner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout assets branch
        uses: actions/checkout@v4
        with:
          ref: assets

      - name: Download banner (raw) and write to new path
        run: |
          set -euo pipefail
          RAW_URL="https://raw.githubusercontent.com/xianfanhuang/Studio/assets/assets/.aistudio/%20banner-minimal.png"
          mkdir -p assets/.aistudio
          echo "Downloading from: $RAW_URL"
          curl -fSL "$RAW_URL" -o "assets/.aistudio/banner-minimal.png"

      - name: Prepare git commit (rename + README fix)
        env:
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
        run: |
          set -euo pipefail
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"

          # Stage new file
          git add "assets/.aistudio/banner-minimal.png"

          # Remove the old file with leading space if it exists
          if [ -f "assets/.aistudio/ banner-minimal.png" ]; then
            git rm -f "assets/.aistudio/ banner-minimal.png"
          fi

          # Update README: replace encoded %20 path with clean filename
          if [ -f README.md ]; then
            sed -i 's/%20banner-minimal.png/banner-minimal.png/g' README.md || true
            git add README.md
          fi

          # Commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "Rename: remove leading space from banner-minimal.png and update README"
            git push origin HEAD:assets
          else
            echo "No changes to commit"
          fi
